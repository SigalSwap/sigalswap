[package]
name = "sigalswap_factory"
type = "contract"
authors = ["SigalSwap"]
# Floor is >=0.1.0 because Nargo rejects pre-release version requirements
# (">=1.0.0-beta.21" errors; ">=1.0.0" would exclude the beta we build with).
# The toolchain is pinned to Noir 1.0.0-beta.21 (Aztec v4.3.0) in README and
# drift-guarded by lp-token's class_id_probe test.
compiler_version = ">=0.1.0"

[dependencies]
aztec = { git = "https://github.com/AztecProtocol/aztec-packages", tag = "v4.3.0", directory = "noir-projects/aztec-nr/aztec" }
sigalswap_core = { path = "../core" }

# NOTE: sigalswap_lp_token and the mock_pair_v2 test fixture are intentionally
# NOT dependencies here -- both are used only by the TXE tests, which now live
# in the sibling `sigalswap_factory_tests` crate. (lp-token remains in this
# artifact's build graph TRANSITIVELY via sigalswap_core, which legitimately
# uses it; mock_pair_v2 is a pure test fixture and is fully removed.) Keeping
# fixtures out of this production build graph makes the deployed Factory
# class_id reproducible from clean source.

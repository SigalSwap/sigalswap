[package]
name = "sigalswap_periphery_tests"
type = "contract"
authors = ["SigalSwap"]
# Test-only crate: hosts the TXE integration tests for sigalswap_periphery so the
# abusive_pair / mock_factory test fixtures stay OUT of the production
# sigalswap_periphery build graph (keeping the deployed Router class_id
# reproducible from clean source).
compiler_version = ">=0.1.0"

[dependencies]
aztec = { git = "https://github.com/AztecProtocol/aztec-packages", tag = "v4.3.0", directory = "noir-projects/aztec-nr/aztec" }
token = { git = "https://github.com/AztecProtocol/aztec-packages", tag = "v4.3.0", directory = "noir-projects/noir-contracts/contracts/app/token_contract" }

sigalswap_periphery = { path = "../periphery" }
sigalswap_core = { path = "../core" }
sigalswap_factory = { path = "../factory" }
sigalswap_lp_token = { path = "../lp-token" }

# Test-fixture contracts (formerly in periphery's [dependencies]).
abusive_pair = { path = "../test-contracts/abusive-pair" }
mock_factory = { path = "../test-contracts/mock-factory" }
